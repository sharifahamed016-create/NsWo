<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with smooth premium emerald gradient -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#g)" rx="120" />
  
  <!-- Outer Gold glowing ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.85" />
  
  <!-- Middle Decorative Gold Dots representing welfare community members -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="10, 15" opacity="0.5" />

  <!-- Premium Welfare Hands / Shelter Logo shape in Gold -->
  <g transform="translate(128, 128) scale(0.5)" fill="url(#gold)">
    <!-- Shield / Community house icon -->
    <path d="M256 64 L416 192 L416 448 L96 448 L96 192 Z" opacity="0.15" />
    <!-- Roof -->
    <path d="M256 32 L448 192 L416 216 L256 80 L96 216 L64 192 Z" />
    <!-- People / Hands of Support -->
    <path d="M256 180 C280 180 300 200 300 224 C300 248 280 268 256 268 C232 268 212 248 212 224 C212 200 232 180 256 180 Z" />
    <path d="M256 290 C180 290 140 330 140 380 L372 380 C372 330 332 290 256 290 Z" />
  </g>

  <!-- Bengali typographic monogram inside the logo circle: NSWO in graceful calligraphy -->
  <text x="256" y="415" font-family="'Hind Siliguri', 'Inter', sans-serif" font-weight="900" font-size="34" fill="#fbbf24" text-anchor="middle" letter-spacing="2">NSWO</text>
  <text x="256" y="445" font-family="'Hind Siliguri', 'Inter', sans-serif" font-weight="700" font-size="16" fill="#fef08a" text-anchor="middle" letter-spacing="1">সমাজকল্যাণ সংস্থা</text>
</svg>
